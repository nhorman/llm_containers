secrets:
  hf_token:
    file: ./hf_token_secret
volumes:
  open-terminal:

services:
  openui:
    privileged: true
    network_mode: "host"
    container_name: openwebui
    image: ghcr.io/open-webui/open-webui:main
    volumes:
      - ~/open-webui:/app/backend/data
  openterminal:
    privileged: true
    network_mode: "host"
    container_name: openterminal
    image: ghcr.io/open-webui/open-terminal
    volumes:
      - open-terminal:/home/user
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - OPEN_TERMINAL_API_KEY=openterminalkey
